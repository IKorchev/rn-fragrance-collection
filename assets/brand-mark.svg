<!--
  App icon / splash source mark — atomizer bottle, matching the sign-in hero's
  motif (src/components/sign-in-hero.tsx) but bolder/single-silhouette so it
  stays legible at 40-80px home-screen sizes.

  This is a SOURCE file, not wired into app.json. Rasterizing it into the
  actual asset PNGs (icon.png 1024x1024 opaque, adaptive-icon.png 1024x1024
  transparent w/ content in the center ~66% safe zone, splash.png 1284x2778
  transparent, favicon.png 48x48) needs an SVG-to-PNG export step this
  environment's screenshot tooling couldn't complete (browser + adb screen
  capture were both non-functional this session). Export via any SVG tool
  (Figma, Inkscape, an online converter) at those exact sizes, or retry the
  browser-rasterization pipeline once screenshot capture is working again.
-->
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#10b981"/>
      <stop offset="1" stop-color="#047857"/>
    </linearGradient>
  </defs>
  <!-- Full-bleed background for icon.png — omit this rect (transparent
       canvas) when exporting adaptive-icon.png / splash.png -->
  <rect x="0" y="0" width="1024" height="1024" fill="url(#bg)"/>

  <g transform="translate(512 512)">
    <rect x="-64" y="-230" width="128" height="90" rx="24" fill="#ffffff"/>
    <rect x="-84" y="-150" width="168" height="64" rx="20" fill="#ffffff" opacity="0.95"/>
    <rect x="-30" y="-96" width="60" height="46" fill="#ffffff" opacity="0.95"/>
    <rect x="-140" y="-56" width="280" height="330" rx="70" fill="#ffffff"/>
    <rect x="-70" y="20" width="140" height="110" rx="26" fill="#047857"/>
    <path d="M0 50 C -14 72, -24 86, -24 100 A24 24 0 0 0 24 100 C24 86, 14 72, 0 50 Z" fill="#ffffff"/>
  </g>
</svg>
