# Legal screens: the Profile tab links to the Privacy Policy and Terms &
# Conditions screens (regular pushed screens, not sheets) and both render
# their content.
appId: com.korchev.fragrancecollection
tags:
  - legal
---
- runFlow: ../subflows/launch-dev-client.yaml

# Profile is a regular tab now
- tapOn: "Profile"
- extendedWaitUntil:
    visible: "Wear history"
    timeout: 10000

# The Upgrade to Pro row (shown when RevenueCat keys are configured) pushes
# Privacy Policy below the fold
- scrollUntilVisible:
    element:
      text: "Privacy Policy"
    direction: DOWN
- tapOn: "Privacy Policy"
- extendedWaitUntil:
    visible: "What we collect"
    timeout: 10000
# Later sections start below the fold — scroll to them
- scrollUntilVisible:
    element:
      text: "Data retention and deletion"
    direction: DOWN
- back

# The Terms row starts below the fold
- scrollUntilVisible:
    element:
      text: "Terms & Conditions"
    direction: DOWN
- tapOn: "Terms & Conditions"
- extendedWaitUntil:
    visible: "Acceptable use"
    timeout: 10000
# Long document — the default 20s scroll budget falls one swipe short
- scrollUntilVisible:
    element:
      text: "Limitation of liability"
    direction: DOWN
    timeout: 45000
